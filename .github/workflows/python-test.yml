name: Python Test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - 'packages/python/**'
      - 'packages/rust/**'
      - 'Cargo.lock'
  pull_request:
    paths:
      - 'packages/python/**'
      - 'packages/rust/**'
      - 'Cargo.lock'

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: uv sync --extra dev
        working-directory: packages/python

      - name: Build Rust extension
        run: uv run maturin develop
        working-directory: packages/python

      - name: Run unit tests
        run: uv run python -m pytest python/ -x -q --tb=short
        working-directory: packages/python

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install dependencies
        run: uv sync --extra dev
        working-directory: packages/python

      - name: Build Rust extension
        run: uv run maturin develop
        working-directory: packages/python

      - name: Run integration tests
        run: uv run python -m pytest tests/integration/ -x -q --tb=short
        working-directory: packages/python

  coverage:
    name: Coverage floor (90%)
    runs-on: ubuntu-latest
    needs: [unit, integration]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra dev
        working-directory: packages/python

      - name: Build Rust extension
        run: uv run maturin develop
        working-directory: packages/python

      - name: Run combined coverage (unit + integration, no e2e)
        run: uv run python -m pytest python/ tests/integration/ -q --tb=short --cov=dirsql --cov-report=term-missing --cov-fail-under=90
        working-directory: packages/python
