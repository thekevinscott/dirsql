name: TS Test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - 'packages/ts/**'
      - 'packages/core/**'
  pull_request:
    paths:
      - 'packages/ts/**'
      - 'packages/core/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: packages/ts
        run: pnpm install

      - name: Build native module
        working-directory: packages/ts
        run: pnpm build

      - name: List build output
        working-directory: packages/ts
        run: ls -la *.node 2>/dev/null || echo "No .node files found in packages/ts/"; ls -la ../../target/release/*.node 2>/dev/null || echo "No .node in target/release"; ls -la ../../target/release/libdirsql* 2>/dev/null || echo "No libdirsql in target/release"

      - name: Run tests
        working-directory: packages/ts
        run: pnpm test
