name: TS Test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - 'packages/ts/**'
      - 'packages/core/**'
  pull_request:
    paths:
      - 'packages/ts/**'
      - 'packages/core/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: packages/ts
        run: pnpm install

      - name: Build native module
        working-directory: packages/ts
        run: pnpm build

      - name: Debug module exports
        working-directory: packages/ts
        run: node -e "const m = require('./dirsql.node'); console.log('exports:', Object.keys(m)); console.log('DirSQL:', typeof m.DirSQL);"

      - name: Run tests
        working-directory: packages/ts
        run: pnpm test
