name: Publish Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_call:
    inputs:
      bump_type:
        description: 'Version bump type: patch or minor'
        required: true
        type: string
      publish_pypi:
        description: 'Whether to publish to PyPI'
        required: false
        type: boolean
        default: true
      publish_crates:
        description: 'Whether to publish to crates.io'
        required: false
        type: boolean
        default: true
      dry_run:
        description: 'Dry run: compute the plan but skip all destructive operations (tag, publish, release)'
        required: false
        type: boolean
        default: false
    outputs:
      tag_created:
        description: 'Whether a tag was created'
        value: ${{ jobs.tag.outputs.created }}
      new_version:
        description: 'The new version number'
        value: ${{ jobs.tag.outputs.new_version }}

jobs:
  check-python:
    runs-on: ubuntu-latest
    outputs:
      has_python: ${{ steps.check.outputs.has_python }}
    steps:
      - uses: actions/checkout@v6
      - name: Check for pyproject.toml
        id: check
        run: |
          if [ -f packages/python/pyproject.toml ]; then
            echo "has_python=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_python=false" >> "$GITHUB_OUTPUT"
          fi

  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      created: ${{ steps.tag.outputs.created }}
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get current state
        id: current
        run: |
          latest_tag=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | head -n1 || true)
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          if [ -n "$latest_tag" ]; then
            commits=$(git rev-list "${latest_tag}..HEAD" --count)
          else
            commits=0
          fi
          echo "commits_since_tag=$commits" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: version
        env:
          LATEST_TAG: ${{ steps.current.outputs.latest_tag }}
          BUMP_TYPE: ${{ inputs.bump_type }}
          COMMITS_SINCE_TAG: ${{ steps.current.outputs.commits_since_tag }}
        run: python3 scripts/release/compute_version.py

      - name: Check if tag already exists on remote
        id: tag_check
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${NEW_VERSION}$"; then
            echo "Tag v${NEW_VERSION} already exists on remote"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Plan (dry run)
        if: inputs.dry_run
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
          SHOULD_RELEASE: ${{ steps.version.outputs.should_release }}
          TAG_EXISTS: ${{ steps.tag_check.outputs.exists }}
          PUBLISH_PYPI: ${{ inputs.publish_pypi }}
          PUBLISH_CRATES: ${{ inputs.publish_crates }}
          BUMP: ${{ inputs.bump_type }}
        run: |
          echo "=== DRY RUN PLAN ==="
          echo "bump_type:        $BUMP"
          echo "new_version:      $NEW_VERSION"
          echo "should_release:   $SHOULD_RELEASE"
          echo "tag_exists:       $TAG_EXISTS"
          echo "would publish_pypi:   $PUBLISH_PYPI"
          echo "would publish_crates: $PUBLISH_CRATES"
          echo "===================="

      - name: Create and push tag
        if: >-
          !inputs.dry_run &&
          steps.version.outputs.should_release == 'true' &&
          steps.tag_check.outputs.exists != 'true'
        id: tag
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"
          echo "created=true" >> "$GITHUB_OUTPUT"

  build:
    needs: [check-python, tag]
    if: needs.check-python.outputs.has_python == 'true' && needs.tag.outputs.created == 'true' && inputs.publish_pypi
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update pyproject.toml version
        shell: bash
        run: |
          sed -i.bak 's/^version = ".*"/version = "${{ needs.tag.outputs.new_version }}"/' packages/python/pyproject.toml

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --manifest-path packages/python/Cargo.toml --interpreter 3.9 3.10 3.11 3.12 3.13
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist

  sdist:
    needs: [check-python, tag]
    if: needs.check-python.outputs.has_python == 'true' && needs.tag.outputs.created == 'true' && inputs.publish_pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update pyproject.toml version
        run: |
          sed -i 's/^version = ".*"/version = "${{ needs.tag.outputs.new_version }}"/' packages/python/pyproject.toml

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path packages/python/Cargo.toml

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  publish-pypi:
    needs: [tag, build, sdist]
    if: always() && needs.tag.outputs.created == 'true' && needs.sdist.result == 'success' && inputs.publish_pypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        if: '!inputs.dry_run'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: false
          # Idempotency: silently skip files already uploaded to PyPI so a
          # partial prior release can be resumed without getting stuck on
          # this leg. Mirrors the crates.io pre-check.
          skip-existing: true

      - name: Would publish to PyPI (dry run)
        if: inputs.dry_run
        run: |
          echo "DRY RUN: would upload the following artifacts to PyPI"
          ls -la dist

  publish-crates:
    needs: tag
    if: needs.tag.outputs.created == 'true' && inputs.publish_crates
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update Cargo.toml versions
        run: |
          # All package Cargo.toml files inherit `version.workspace = true`,
          # so the only literal `version = "..."` lives in the workspace root.
          # cargo publish reads that value when packaging -- bump it here or
          # the upload reuses the stale workspace version.
          sed -i 's/^version = ".*"/version = "${{ needs.tag.outputs.new_version }}"/' Cargo.toml

      - name: Check if version already on crates.io
        id: crates_check
        env:
          REGISTRY: crates
          PACKAGE: dirsql
          VERSION: ${{ needs.tag.outputs.new_version }}
        run: python3 scripts/release/check_published.py

      - name: Cargo publish dry-run
        if: inputs.dry_run && steps.crates_check.outputs.skip != 'true'
        run: cargo publish -p dirsql --allow-dirty --dry-run

      - name: Get crates.io token
        if: '!inputs.dry_run && steps.crates_check.outputs.skip != ''true'''
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish to crates.io
        if: '!inputs.dry_run && steps.crates_check.outputs.skip != ''true'''
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          # Publish only the consolidated dirsql crate. The Python and
          # TypeScript binding crates are marked publish = false in their
          # Cargo.toml files and are not published to crates.io.
          for attempt in 1 2 3; do
            echo "Publishing dirsql (attempt $attempt of 3)"
            if cargo publish -p dirsql --allow-dirty; then
              echo "Published dirsql successfully"
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Publish failed, retrying in 15s..."
              sleep 15
            else
              echo "All attempts failed for dirsql"
              exit 1
            fi
          done

  github-release:
    needs: [tag, publish-pypi, publish-crates]
    if: '!inputs.dry_run && always() && needs.tag.outputs.created == ''true'''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ needs.tag.outputs.new_version }}" \
            --repo ${{ github.repository }} \
            --title "v${{ needs.tag.outputs.new_version }}" \
            --generate-notes

  rollback:
    needs: [tag, publish-pypi, publish-crates]
    # Only delete the tag if BOTH publish legs actually failed. `!= 'success'`
    # also matches 'skipped', which fires this branch for legitimate gated-off
    # runs (e.g. a TS-only release where publish_pypi=false and
    # publish_crates=false). Rolling back there removes a tag whose artifacts
    # shipped on npm -- the GitHub Release then dangles against a missing ref.
    # crates.io publishes are permanent, so if crates succeeded we must keep
    # the tag even if pypi failed.
    if: |
      !inputs.dry_run &&
      always() &&
      needs.tag.outputs.created == 'true' &&
      needs.publish-pypi.result == 'failure' &&
      needs.publish-crates.result == 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Rollback tag on failure
        run: git push --delete origin "v${{ needs.tag.outputs.new_version }}"
