name: Publish Release

on:
  workflow_call:
    inputs:
      bump_type:
        description: 'Version bump type: patch or minor'
        required: true
        type: string
      publish_pypi:
        description: 'Whether to publish to PyPI'
        required: false
        type: boolean
        default: true
      publish_crates:
        description: 'Whether to publish to crates.io'
        required: false
        type: boolean
        default: true
    outputs:
      tag_created:
        description: 'Whether a tag was created'
        value: ${{ jobs.tag.outputs.created }}
      new_version:
        description: 'The new version number'
        value: ${{ jobs.tag.outputs.new_version }}

jobs:
  check-python:
    runs-on: ubuntu-latest
    outputs:
      has_python: ${{ steps.check.outputs.has_python }}
    steps:
      - uses: actions/checkout@v6
      - name: Check for pyproject.toml
        id: check
        run: |
          if [ -f packages/python/pyproject.toml ]; then
            echo "has_python=true" >> $GITHUB_OUTPUT
          else
            echo "has_python=false" >> $GITHUB_OUTPUT
          fi

  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      created: ${{ steps.tag.outputs.created }}
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get current version
        id: current
        run: |
          latest_tag=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | head -n1)

          if [ -z "$latest_tag" ]; then
            echo "No tags found"
            echo "version=0.0.0" >> $GITHUB_OUTPUT
            echo "has_tags=false" >> $GITHUB_OUTPUT
          else
            echo "Latest tag: $latest_tag"
            echo "version=${latest_tag#v}" >> $GITHUB_OUTPUT
            echo "has_tags=true" >> $GITHUB_OUTPUT

            commits_since_tag=$(git rev-list ${latest_tag}..HEAD --count)
            echo "commits_since_tag=$commits_since_tag" >> $GITHUB_OUTPUT
          fi

      - name: Check for changes (patch only)
        if: inputs.bump_type == 'patch' && steps.current.outputs.has_tags == 'true'
        id: check_changes
        run: |
          if [ "${{ steps.current.outputs.commits_since_tag }}" -eq 0 ]; then
            echo "No new commits since last tag, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Found ${{ steps.current.outputs.commits_since_tag }} commits since last tag"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Calculate new version
        id: version
        run: |
          current="${{ steps.current.outputs.version }}"
          IFS='.' read -r major minor patch <<< "$current"

          if [ "${{ inputs.bump_type }}" == "minor" ]; then
            new_version="${major}.$((minor + 1)).0"
          else
            new_version="${major}.${minor}.$((patch + 1))"
          fi

          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "New version will be: $new_version"

      - name: Check if tag exists
        id: tag_check
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ steps.version.outputs.new_version }}$"; then
            echo "Tag v${{ steps.version.outputs.new_version }} already exists on remote"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine if release should proceed
        id: should_release
        run: |
          if [ "${{ steps.tag_check.outputs.exists }}" == "true" ]; then
            echo "proceed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ inputs.bump_type }}" == "patch" ] && [ "${{ steps.current.outputs.has_tags }}" == "true" ]; then
            if [ "${{ steps.check_changes.outputs.should_release }}" == "false" ]; then
              echo "proceed=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          echo "proceed=true" >> $GITHUB_OUTPUT

      - name: Create and push tag
        if: steps.should_release.outputs.proceed == 'true'
        id: tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.new_version }}" -m "Release v${{ steps.version.outputs.new_version }}"
          git push origin "v${{ steps.version.outputs.new_version }}"
          echo "created=true" >> $GITHUB_OUTPUT

  build:
    needs: [check-python, tag]
    if: needs.check-python.outputs.has_python == 'true' && needs.tag.outputs.created == 'true' && inputs.publish_pypi
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update pyproject.toml version
        shell: bash
        run: |
          sed -i.bak 's/^version = ".*"/version = "${{ needs.tag.outputs.new_version }}"/' packages/python/pyproject.toml

      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --manifest-path packages/python/Cargo.toml
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist

  sdist:
    needs: [check-python, tag]
    if: needs.check-python.outputs.has_python == 'true' && needs.tag.outputs.created == 'true' && inputs.publish_pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update pyproject.toml version
        run: |
          sed -i 's/^version = ".*"/version = "${{ needs.tag.outputs.new_version }}"/' packages/python/pyproject.toml

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path packages/python/Cargo.toml

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  publish-pypi:
    needs: [tag, build, sdist]
    if: always() && needs.tag.outputs.created == 'true' && needs.sdist.result == 'success' && inputs.publish_pypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: false

  publish-crates:
    needs: tag
    if: needs.tag.outputs.created == 'true' && inputs.publish_crates
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update Cargo.toml versions
        run: |
          sed -i 's/^version = ".*"/version = "${{ needs.tag.outputs.new_version }}"/' packages/core/Cargo.toml
          sed -i 's/^version = ".*"/version = "${{ needs.tag.outputs.new_version }}"/' packages/rust/Cargo.toml
          sed -i 's/^version = ".*"/version = "${{ needs.tag.outputs.new_version }}"/' packages/python/Cargo.toml

      - name: Get crates.io token
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          # Publish core first, then the Rust SDK, then the Python bindings
          for pkg in dirsql-core dirsql-sdk dirsql; do
            for attempt in 1 2 3; do
              echo "Publishing $pkg (attempt $attempt of 3)"
              if cargo publish -p "$pkg" --allow-dirty; then
                echo "Published $pkg successfully"
                break
              fi
              if [ "$attempt" -lt 3 ]; then
                echo "Publish failed, retrying in 15s..."
                sleep 15
              else
                echo "All attempts failed for $pkg"
                exit 1
              fi
            done
          done

  github-release:
    needs: [tag, publish-pypi, publish-crates]
    if: always() && needs.tag.outputs.created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ needs.tag.outputs.new_version }}" \
            --repo ${{ github.repository }} \
            --title "v${{ needs.tag.outputs.new_version }}" \
            --generate-notes

  rollback:
    needs: [tag, publish-pypi, publish-crates]
    if: |
      always() &&
      needs.tag.outputs.created == 'true' &&
      (needs.publish-pypi.result == 'failure' ||
       needs.publish-crates.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Rollback tag on failure
        run: git push --delete origin "v${{ needs.tag.outputs.new_version }}"
