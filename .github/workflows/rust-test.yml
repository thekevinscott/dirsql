name: Rust Test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - 'packages/rust/**'
      - 'packages/python/src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust-test.yml'
  pull_request:
    paths:
      - 'packages/rust/**'
      - 'packages/python/src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust-test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run coverage
        run: cargo llvm-cov --manifest-path packages/rust/Cargo.toml --fail-under-lines 90

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

      # Silent-skip canary: without `--features cli`, the `dirsql` bin target
      # must be gated off by `required-features = ["cli"]`. If someone drops
      # that line, a default `cargo install dirsql` would pull clap into every
      # library consumer's build -- this guard catches that regression.
      #
      # Uses an isolated --target-dir so a cached `target/debug/dirsql`
      # (built with --features cli on a previous run and restored by
      # actions/cache) can't mask a regression.
      - name: Silent-skip canary (no bin without cli feature)
        run: |
          cargo build -p dirsql --locked --target-dir target/canary
          test ! -x target/canary/debug/dirsql

      - name: CLI feature build + smoke
        run: |
          cargo build -p dirsql --features cli --locked
          ./target/debug/dirsql --version
