name: Rust Test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - 'packages/rust/**'
      - 'packages/python/src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust-test.yml'
  pull_request:
    paths:
      - 'packages/rust/**'
      - 'packages/python/src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust-test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run coverage
        run: cargo llvm-cov --manifest-path packages/rust/Cargo.toml --fail-under-lines 90

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check
