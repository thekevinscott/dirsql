name: Rust Test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - 'packages/core/**'
      - 'packages/rust/**'
      - 'packages/python/src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    paths:
      - 'packages/core/**'
      - 'packages/rust/**'
      - 'packages/python/src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Run tests
        run: cargo test --workspace

      - name: Coverage
        run: |
          cargo install cargo-tarpaulin
          cargo tarpaulin -p dirsql-core --out xml --fail-under 80 --exclude-files "packages/rust/*" --exclude-files "packages/python/*"

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check
