name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Run at 2:00 AM UTC every day
    - cron: '0 2 * * *'
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump'
        type: choice
        options:
          - patch
          - minor
        default: patch
      publish_mode:
        description: 'Which packages to publish (custom uses the booleans below)'
        type: choice
        options:
          - all
          - changed
          - custom
        default: all
      publish_python:
        description: 'Publish Python (only used when publish_mode=custom)'
        type: boolean
        default: true
      publish_rust:
        description: 'Publish Rust (only used when publish_mode=custom)'
        type: boolean
        default: true
      publish_js:
        description: 'Publish JS/npm (only used when publish_mode=custom)'
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      bump_type: ${{ steps.decide.outputs.bump_type }}
    steps:
      - id: decide
        env:
          EVENT: ${{ github.event_name }}
          STRATEGY: ${{ vars.RELEASE_STRATEGY }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          DISPATCH_BUMP: ${{ inputs.bump_type }}
        run: |
          # Schedule and push only ever produce patch releases. Minor is
          # workflow_dispatch-only.
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "bump_type=${DISPATCH_BUMP:-patch}" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT" = "schedule" ] && [ "$STRATEGY" != "immediate" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "bump_type=patch" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT" = "push" ] && [ "$STRATEGY" = "immediate" ]; then
            case "$COMMIT_MSG" in
              *'[no-release]'*)
                echo "should_release=false" >> "$GITHUB_OUTPUT"
                echo "bump_type=patch" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "should_release=true" >> "$GITHUB_OUTPUT"
                echo "bump_type=patch" >> "$GITHUB_OUTPUT"
                ;;
            esac
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "bump_type=patch" >> "$GITHUB_OUTPUT"
          fi

  detect-changes:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      rust_changed: ${{ steps.changes.outputs.rust_changed }}
      python_changed: ${{ steps.changes.outputs.python_changed }}
      js_changed: ${{ steps.changes.outputs.js_changed }}
      docs_changed: ${{ steps.changes.outputs.docs_changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve publish targets
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUBLISH_MODE: ${{ inputs.publish_mode || 'all' }}
          CUSTOM_PYTHON: ${{ inputs.publish_python }}
          CUSTOM_RUST: ${{ inputs.publish_rust }}
          CUSTOM_JS: ${{ inputs.publish_js }}
        run: |
          # Scheduled/push releases always auto-detect from the diff since
          # the last tag. Manual dispatches honor publish_mode.
          mode="$PUBLISH_MODE"
          if [ "$EVENT_NAME" != "workflow_dispatch" ]; then
            mode="changed"
          fi

          if [ "$mode" = "all" ]; then
            echo "rust_changed=true"    >> "$GITHUB_OUTPUT"
            echo "python_changed=true"  >> "$GITHUB_OUTPUT"
            echo "js_changed=true"      >> "$GITHUB_OUTPUT"
            echo "docs_changed=true"    >> "$GITHUB_OUTPUT"
            echo "Mode: all (publish everything)"
            exit 0
          fi

          if [ "$mode" = "custom" ]; then
            # No cascade in custom mode -- user explicitly picks targets.
            echo "rust_changed=${CUSTOM_RUST:-false}"     >> "$GITHUB_OUTPUT"
            echo "python_changed=${CUSTOM_PYTHON:-false}" >> "$GITHUB_OUTPUT"
            echo "js_changed=${CUSTOM_JS:-false}"         >> "$GITHUB_OUTPUT"
            echo "docs_changed=false"                     >> "$GITHUB_OUTPUT"
            echo "Mode: custom (python=$CUSTOM_PYTHON rust=$CUSTOM_RUST js=$CUSTOM_JS)"
            exit 0
          fi

          # mode=changed: diff files since last tag. Rust core changes
          # cascade to all three since Python and TS bundle the Rust binary.
          latest_tag=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | head -n1)

          if [ -z "$latest_tag" ]; then
            echo "rust_changed=true"   >> "$GITHUB_OUTPUT"
            echo "python_changed=true" >> "$GITHUB_OUTPUT"
            echo "js_changed=true"     >> "$GITHUB_OUTPUT"
            echo "docs_changed=true"   >> "$GITHUB_OUTPUT"
            echo "No prior tag; treating all as changed"
            exit 0
          fi

          changed_files=$(git diff --name-only "${latest_tag}..HEAD")

          if [ -z "$changed_files" ]; then
            echo "rust_changed=false"   >> "$GITHUB_OUTPUT"
            echo "python_changed=false" >> "$GITHUB_OUTPUT"
            echo "js_changed=false"     >> "$GITHUB_OUTPUT"
            echo "docs_changed=false"   >> "$GITHUB_OUTPUT"
            echo "No files changed since $latest_tag"
            exit 0
          fi

          rust_changed=false
          python_changed=false
          js_changed=false
          docs_changed=false

          while IFS= read -r file; do
            case "$file" in
              packages/rust/**|packages/python/src/**|Cargo.lock) rust_changed=true ;;
              packages/python/**.py|packages/python/pyproject.toml) python_changed=true ;;
              packages/ts/**) js_changed=true ;;
              README.md|*.md) docs_changed=true ;;
            esac
          done <<< "$changed_files"

          echo "rust_changed=$rust_changed"     >> "$GITHUB_OUTPUT"
          echo "python_changed=$python_changed" >> "$GITHUB_OUTPUT"
          echo "js_changed=$js_changed"         >> "$GITHUB_OUTPUT"
          echo "docs_changed=$docs_changed"     >> "$GITHUB_OUTPUT"
          echo "Mode: changed (rust=$rust_changed python=$python_changed js=$js_changed docs=$docs_changed)"

  release:
    needs: [check, detect-changes]
    if: >-
      needs.check.outputs.should_release == 'true' &&
      (needs.detect-changes.outputs.rust_changed == 'true' ||
       needs.detect-changes.outputs.python_changed == 'true' ||
       needs.detect-changes.outputs.js_changed == 'true' ||
       needs.detect-changes.outputs.docs_changed == 'true')
    uses: ./.github/workflows/publish.yml
    with:
      bump_type: ${{ needs.check.outputs.bump_type }}
      publish_pypi: ${{ needs.detect-changes.outputs.rust_changed == 'true' || needs.detect-changes.outputs.python_changed == 'true' || needs.detect-changes.outputs.docs_changed == 'true' }}
      publish_crates: ${{ needs.detect-changes.outputs.rust_changed == 'true' || needs.detect-changes.outputs.docs_changed == 'true' }}
    secrets: inherit
    permissions:
      contents: write
      id-token: write

  # npm publish inlined here because npm OIDC doesn't support reusable workflows
  # (it validates the caller workflow name, not the called workflow)
  publish-npm:
    needs: [check, detect-changes, release]
    if: >-
      always() &&
      needs.check.outputs.should_release == 'true' &&
      needs.release.outputs.tag_created == 'true' &&
      (needs.detect-changes.outputs.rust_changed == 'true' ||
       needs.detect-changes.outputs.js_changed == 'true' ||
       needs.detect-changes.outputs.docs_changed == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Check if package.json exists
        id: check_npm
        run: |
          if [ -f packages/ts/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check_npm.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Install pnpm
        if: steps.check_npm.outputs.exists == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        if: steps.check_npm.outputs.exists == 'true'
        run: pnpm install --frozen-lockfile
        working-directory: packages/ts

      - name: Check if version already on npm
        if: steps.check_npm.outputs.exists == 'true'
        id: npm_check
        env:
          VERSION: ${{ needs.release.outputs.new_version }}
        run: |
          pkg=$(node -p "require('./package.json').name")
          if npm view "$pkg@$VERSION" version >/dev/null 2>&1; then
            echo "$pkg@$VERSION already on npm; skipping publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        working-directory: packages/ts

      - name: Update package.json version
        if: steps.check_npm.outputs.exists == 'true' && steps.npm_check.outputs.skip != 'true'
        run: npm version "${{ needs.release.outputs.new_version }}" --no-git-tag-version
        working-directory: packages/ts

      - name: Build napi binary and TS
        if: steps.check_npm.outputs.exists == 'true' && steps.npm_check.outputs.skip != 'true'
        run: pnpm run build
        working-directory: packages/ts

      - name: Publish to npm
        if: steps.check_npm.outputs.exists == 'true' && steps.npm_check.outputs.skip != 'true'
        run: npm publish --provenance --access public
        working-directory: packages/ts
