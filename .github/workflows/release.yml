name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Run at 2:00 AM UTC every day
    - cron: '0 2 * * *'
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump'
        type: choice
        options:
          - patch
          - minor
        default: patch
      publish_mode:
        description: 'Which packages to publish (custom uses the booleans below)'
        type: choice
        options:
          - all
          - changed
          - custom
        default: all
      publish_python:
        description: 'Publish Python (only used when publish_mode=custom)'
        type: boolean
        default: false
      publish_rust:
        description: 'Publish Rust (only used when publish_mode=custom)'
        type: boolean
        default: false
      publish_js:
        description: 'Publish JS/npm (only used when publish_mode=custom)'
        type: boolean
        default: false
      dry_run:
        description: 'Dry run: compute the plan but skip all destructive operations (tag, publish, release)'
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      bump_type: ${{ steps.decide.outputs.bump_type }}
      dry_run: ${{ steps.decide.outputs.dry_run }}
    steps:
      - id: decide
        env:
          EVENT: ${{ github.event_name }}
          STRATEGY: ${{ vars.RELEASE_STRATEGY }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          DISPATCH_BUMP: ${{ inputs.bump_type }}
          DISPATCH_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          # Schedule and push only ever produce patch releases. Minor is
          # workflow_dispatch-only. Non-dispatch events never dry-run
          # (scheduled cuts should actually ship).
          dry_run=false
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "bump_type=${DISPATCH_BUMP:-patch}" >> "$GITHUB_OUTPUT"
            dry_run="${DISPATCH_DRY_RUN:-true}"
          elif [ "$EVENT" = "schedule" ] && [ "$STRATEGY" != "immediate" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "bump_type=patch" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT" = "push" ] && [ "$STRATEGY" = "immediate" ]; then
            case "$COMMIT_MSG" in
              *'[no-release]'*)
                echo "should_release=false" >> "$GITHUB_OUTPUT"
                echo "bump_type=patch" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "should_release=true" >> "$GITHUB_OUTPUT"
                echo "bump_type=patch" >> "$GITHUB_OUTPUT"
                ;;
            esac
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "bump_type=patch" >> "$GITHUB_OUTPUT"
          fi
          echo "dry_run=$dry_run" >> "$GITHUB_OUTPUT"

  detect-changes:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      rust_changed: ${{ steps.changes.outputs.rust_changed }}
      python_changed: ${{ steps.changes.outputs.python_changed }}
      js_changed: ${{ steps.changes.outputs.js_changed }}
      docs_changed: ${{ steps.changes.outputs.docs_changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Collect diff since last tag
        id: diff
        run: |
          latest_tag=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | head -n1 || true)
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          {
            echo "changed_files<<CHANGED_FILES_EOF"
            if [ -n "$latest_tag" ]; then
              git diff --name-only "${latest_tag}..HEAD"
            fi
            echo "CHANGED_FILES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve publish targets
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUBLISH_MODE: ${{ inputs.publish_mode || 'all' }}
          CUSTOM_PYTHON: ${{ inputs.publish_python }}
          CUSTOM_RUST: ${{ inputs.publish_rust }}
          CUSTOM_JS: ${{ inputs.publish_js }}
          LATEST_TAG: ${{ steps.diff.outputs.latest_tag }}
          CHANGED_FILES: ${{ steps.diff.outputs.changed_files }}
        run: python3 scripts/release/resolve_publish_targets.py

  release:
    needs: [check, detect-changes]
    if: >-
      needs.check.outputs.should_release == 'true' &&
      (needs.detect-changes.outputs.rust_changed == 'true' ||
       needs.detect-changes.outputs.python_changed == 'true' ||
       needs.detect-changes.outputs.js_changed == 'true' ||
       needs.detect-changes.outputs.docs_changed == 'true')
    uses: ./.github/workflows/publish.yml
    with:
      bump_type: ${{ needs.check.outputs.bump_type }}
      dry_run: ${{ needs.check.outputs.dry_run == 'true' }}
      publish_pypi: ${{ needs.detect-changes.outputs.rust_changed == 'true' || needs.detect-changes.outputs.python_changed == 'true' || needs.detect-changes.outputs.docs_changed == 'true' }}
      publish_crates: ${{ needs.detect-changes.outputs.rust_changed == 'true' || needs.detect-changes.outputs.docs_changed == 'true' }}
    secrets: inherit
    permissions:
      contents: write
      id-token: write

  # npm publish inlined here because npm OIDC doesn't support reusable workflows
  # (it validates the caller workflow name, not the called workflow)
  publish-npm:
    needs: [check, detect-changes, release]
    if: >-
      always() &&
      needs.check.outputs.should_release == 'true' &&
      needs.release.outputs.tag_created == 'true' &&
      (needs.detect-changes.outputs.rust_changed == 'true' ||
       needs.detect-changes.outputs.js_changed == 'true' ||
       needs.detect-changes.outputs.docs_changed == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Check if package.json exists
        id: check_npm
        run: |
          if [ -f packages/ts/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Read package name
        if: steps.check_npm.outputs.exists == 'true'
        id: pkg
        run: |
          pkg=$(python3 -c "import json; print(json.load(open('packages/ts/package.json'))['name'])")
          echo "name=$pkg" >> "$GITHUB_OUTPUT"

      - name: Check if version already on npm
        if: steps.check_npm.outputs.exists == 'true'
        id: npm_check
        env:
          REGISTRY: npm
          PACKAGE: ${{ steps.pkg.outputs.name }}
          VERSION: ${{ needs.release.outputs.new_version }}
        run: python3 scripts/release/check_published.py

      - name: Setup Node.js
        if: steps.check_npm.outputs.exists == 'true' && steps.npm_check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Install pnpm
        if: steps.check_npm.outputs.exists == 'true' && steps.npm_check.outputs.skip != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        if: steps.check_npm.outputs.exists == 'true' && steps.npm_check.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile
        working-directory: packages/ts

      - name: Update package.json version
        if: steps.check_npm.outputs.exists == 'true' && steps.npm_check.outputs.skip != 'true'
        run: npm version "${{ needs.release.outputs.new_version }}" --no-git-tag-version
        working-directory: packages/ts

      - name: Build napi binary and TS
        if: steps.check_npm.outputs.exists == 'true' && steps.npm_check.outputs.skip != 'true'
        run: pnpm run build
        working-directory: packages/ts

      - name: Publish to npm (dry-run)
        if: >-
          steps.check_npm.outputs.exists == 'true' &&
          steps.npm_check.outputs.skip != 'true' &&
          needs.check.outputs.dry_run == 'true'
        run: npm publish --provenance --access public --dry-run
        working-directory: packages/ts

      - name: Publish to npm
        if: >-
          steps.check_npm.outputs.exists == 'true' &&
          steps.npm_check.outputs.skip != 'true' &&
          needs.check.outputs.dry_run != 'true'
        run: npm publish --provenance --access public
        working-directory: packages/ts
