[package]
name = "dirsql-core"
version = "0.1.0"
edition = "2024"
description = "Ephemeral SQL index over a local directory"
license = "MIT"
repository = "https://github.com/thekevinscott/dirsql"

[dependencies]
csv = "1"
globset = "0.4"
notify = "7"
rusqlite = { version = "0.34", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "2"
toml = "0.8"
walkdir = "2"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
tempfile = "3"

[[bench]]
name = "db_bench"
harness = false

[[bench]]
name = "scanner_bench"
harness = false

[[bench]]
name = "differ_bench"
harness = false

[[bench]]
name = "matcher_bench"
harness = false
