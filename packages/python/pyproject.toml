[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "dirsql"
version = "0.1.0"
description = "Ephemeral SQL index over a local directory"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Kevin Scott" },
]
repository = "https://github.com/thekevinscott/dirsql"
keywords = ["sql", "filesystem", "directory", "sqlite", "index"]
readme = "README.md"

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-describe>=2",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5",
    "ruff>=0.4",
    "maturin>=1.0",
]

[project.scripts]
# Console script that execs the Rust CLI binary bundled inside the wheel
# at `dirsql/_binary/dirsql` (built by CI before `maturin build`). Wheel
# tags make the wheel platform-specific, so pip picks the right binary
# at install time — no runtime download, no launcher dependency on the
# network.
dirsql = "dirsql._cli.main:main"

[tool.maturin]
features = ["extension-module"]
exclude = [
    "tests/",
]
python-source = "python"
module-name = "dirsql._dirsql"
# CI copies the release-built `dirsql` binary into
# `python/dirsql/_binary/<name>` before `maturin build` so it ships
# inside the wheel as package data. `.gitignore`d; not in source
# control.
include = [
    { path = "python/dirsql/_binary/*", format = "wheel" },
]
