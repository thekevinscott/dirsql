[package]
name = "dirsql"
version = "0.1.0"
edition = "2024"
description = "Ephemeral SQL index over a local directory"
license = "MIT"
repository = "https://github.com/thekevinscott/dirsql"

[dependencies]
csv = "1"
futures-channel = "0.3"
futures-core = "0.3"
globset = "0.4"
notify = "7"
regex = "1"
rusqlite = { version = "0.34", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "2"
tokio = { version = "1", features = ["rt", "sync"] }
toml = "0.8"
walkdir = "2"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
futures-executor = "0.3"
futures-util = "0.3"
tempfile = "3"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }

[[bench]]
name = "db_bench"
harness = false

[[bench]]
name = "scanner_bench"
harness = false

[[bench]]
name = "differ_bench"
harness = false

[[bench]]
name = "matcher_bench"
harness = false
